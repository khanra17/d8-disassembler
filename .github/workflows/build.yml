name: Build D8

on:
  workflow_dispatch:
    inputs:
      v8_branch:
        description: 'V8 Version / Branch'
        required: true
        default: '13.8.258.18'
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    env:
      V8_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.v8_branch || '13.8.258.18' }}
      DEPOT_TOOLS_WIN_TOOLCHAIN: 0

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install depot_tools
        # language=PowerShell
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git C:\depot_tools
          echo "C:\depot_tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Fetch V8
        # language=PowerShell
        run: |
          mkdir target
          cd target
          fetch v8
          cd v8
          git checkout $env:V8_BRANCH
          gclient sync -v

      - name: Upload Source
        uses: actions/upload-artifact@v4
        with:
          name: v8-src-${{ env.V8_BRANCH }}
          path: target/v8/src
          compression-level: 9

      - name: Patch V8
        # language=PowerShell
        run: |
          ./patcher.ps1

      - name: Build D8
        id: build
        # language=PowerShell
        run: |
          cd target\v8
          $release = "out.gn\x64.release"
          mkdir $release
          cp "..\..\scripts\args.gn" "$release\args.gn" -Force
          gn gen $release
          ninja -C $release d8

          $artifact = "d8-with-disassembler-$env:V8_BRANCH"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "artifact=$artifact"

      - name: Cleanup Artifact
        # language=PowerShell
        run: |
          Set-Location target\v8\out.gn\x64.release
          Get-ChildItem
          Remove-Item -Path gen -Recurse -Force
          Remove-Item -Path obj -Recurse -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.artifact }}
          path: target/v8/out.gn/x64.release
          compression-level: 9
